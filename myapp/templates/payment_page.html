{% extends 'base.html' %}

{% block title %}Complete Payment{% endblock %}

{% block content %}
<style>
    .container {
        max-width: 600px;
        margin: auto;
        padding: 20px;
        background-color: #F5F5F5;
        border-radius: 8px;
    }
    h2 {
        text-align: center;
        color: #004080;
    }
    .payment-btn {
        background-color: #FF8200;
        color: white;
        padding: 10px;
        border: none;
        cursor: pointer;
    }
</style>

<div class="container">
    <h2>Complete Payment</h2>
    <p>Please send KES 20 to facilitate book listing.</p>
    <button class="payment-btn" onclick="window.location.href='{% url 'book_list' %}'">Confirm Payment</button>
</div>
{% endblock %}
