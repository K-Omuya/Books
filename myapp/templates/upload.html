{% if success %}
<p class="success">{{ success }}</p>
{% endif %}

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
    {% csrf_token %}
    <input type="text" name="phone" placeholder="Enter phone number" required>
    <input type="text" name="title" placeholder="Book Title" required>
    <input type="text" name="author" placeholder="Author" required>
    <input type="text" name="donor_name" placeholder="Donor Name" required>
    <input type="text" name="contact" placeholder="Email or Phone" required>
    <input type="text" name="location" placeholder="City/Town" required>
    <select name="delivery_option" required>
        <option value="drop_off">Drop Off</option>
        <option value="personal_pickup">Personal Pickup</option>
    </select>
    <button type="submit">Pay & Upload</button>
</form>
