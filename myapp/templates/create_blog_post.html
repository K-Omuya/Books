{% extends 'base.html' %}

{% block title %}Create Blog Post{% endblock %}

{% block content %}
  <!-- Create Blog Post Section -->
  <section class="create-blog-post">
    <div class="container">
      <h2>Create Blog Post</h2>
      <form action="{% url 'create_blog_post' %}" method="post" enctype="multipart/form-data" class="form-flex">
        {% csrf_token %}
        <div class="input-group">
          <label for="title">Title</label>
          <input type="text" id="title" name="title" placeholder="Title" required>
        </div>
        <div class="input-group">
          <label for="content">Content</label>
          <textarea id="content" name="content" placeholder="Write your blog content here" rows="10" required></textarea>
        </div>
        <div class="input-group">
          <label for="image">Upload Image</label>
          <input type="file" id="image" name="image">
        </div>
        <button type="submit" class="submit-btn">Submit Post</button>
      </form>
    </div>
  </section>
{% endblock %}
