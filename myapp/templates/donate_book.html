{% extends 'base.html' %}

{% block title %}Donate a Book{% endblock %}

{% block content %}
    <style>
/* Ensure styles apply only to donation page */
.donation-container {
    max-width: 500px; /* Slightly wider */
    margin: 40px auto;
    padding: 25px;
    background: #f5f5f5; /* Light background */
    border-radius: 10px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    text-align: center;
}

/* Heading */
.donation-container h2 {
    color: #004080; /* Deep blue */
    margin-bottom: 18px;
    font-size: 24px;
    font-weight: bold;
}

/* Buttons */
.btn-container {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.btn {
    flex: 1; /* Equal button spacing */
    text-decoration: none;
    background: #FF8200; /* Bright Orange */
    color: white;
    padding: 10px 15px;
    border-radius: 6px;
    font-weight: bold;
    transition: 0.3s ease;
    text-align: center;
    margin: 0 7px;
    font-size: 15px;
}

.btn:hover {
    background: #cc6800;
}

/* Form */
.donation-form {
    text-align: left;
}

.donation-form label {
    font-weight: bold;
    color: #333;
    font-size: 15px;
}

.donation-form input,
.donation-form select,
.donation-form textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 12px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
}

/* Submit Button */
.submit-btn {
    width: 100%;
    background: #3CB371; /* Soft Green */
    padding: 12px;
    border: none;
    color: white;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    border-radius: 6px;
}

.submit-btn:hover {
    background: #2e8b57;
}

/* Responsive Design */
@media (max-width: 600px) {
    .donation-container {
        width: 95%;
    }
    .btn {
        padding: 8px 12px;
        font-size: 14px;
    }
}
</style>

<div class="donation-container">
    <h2>Donate a Book</h2>

    <div class="btn-container">
        <a href="{% url 'pay' %}" class="btn">Donate Money</a>
        <a href="{% url 'pledge_book' %}" class="btn">Pledge a Book</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="donation-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn submit-btn">Submit Donation</button>
    </form>
</div>
{% endblock %}
