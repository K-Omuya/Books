{% extends 'base.html' %}

{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<style>
    .dashboard-container {
        max-width: 1100px;
        margin: auto;
        padding: 20px;
    }
    .dashboard-title {
        text-align: center;
        color: #004080;
        font-size: 28px;
        font-weight: bold;
    }
    .cards-container {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: space-between;
        margin-top: 20px;
    }
    .card {
        background-color: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        width: 48%;
        text-align: center;
    }
    .card h2 {
        color: #004080;
        font-size: 22px;
    }
    .card p {
        font-size: 18px;
        font-weight: bold;
        color: #FF8200;
    }
    .card a {
        display: inline-block;
        margin-top: 10px;
        text-decoration: none;
        color: white;
        background-color: #3CB371;
        padding: 8px 15px;
        border-radius: 5px;
    }
</style>

<div class="dashboard-container">
    <h1 class="dashboard-title">Admin Dashboard</h1>
    <div class="cards-container">
        <div class="card">
            <h2>Users</h2>
            <p>{{ users_count }}</p>
            <a href="{% url 'admin:auth_user_changelist' %}">Manage Users</a>
        </div>
        <div class="card">
            <h2>Books</h2>
            <p>{{ books_count }}</p>
            <a href="{% url 'admin:app_bookexchange_changelist' %}">Manage Books</a>
        </div>
        <div class="card">
            <h2>Messages</h2>
            <p>{{ messages_count }}</p>
            <a href="{% url 'admin:app_contactmessage_changelist' %}">View Messages</a>
        </div>
        <div class="card">
            <h2>Blog Posts</h2>
            <p>{{ blogs_count }}</p>
            <a href="{% url 'admin:app_blogpost_changelist' %}">Manage Blogs</a>
        </div>
    </div>
</div>
{% endblock %}
