<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book for Donatio</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/login_register.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <h3>Book for Donation</h3>
        <!-- <img src="{% static 'images/logo.png' %}" alt="Logo"> -->
      </div>
      <h2>Login</h2>
      <p>Made easy!</p>
      <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {% for message in messages %}
          <p class="message">{{ message }}</p>
        {% endfor %}
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" name="username" placeholder="Username" required>
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" name="password" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">Login</button>
      </form>
{#      <!-- <a href="{% url 'password_reset' %}" class="forgot-password">Forgot password?</a> -->#}
      <a href="{% url 'register' %}" class="sign-up">Already have an account? Register</a>
    </div>
  </div>
</body>
</html>
