{% extends 'base.html' %}

{% block content %}
    <style>
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #FFFFFF;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
        }

        .navbar .container {
            flex-direction: column;
            align-items: flex-start;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
            color: #333333;
            text-align: left;
            display: block;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        button, .cancel-button {
            background-color: #FF8200;
            color: white;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .cancel-button {
            display: block;
            background-color: #3CB371;
            text-decoration: none;
            margin-top: 15px;
        }

        button:hover { background-color: #e67300; }
        .cancel-button:hover { background-color: #2e8b57; }
        textarea:focus, input:focus {
            border-color: #004080;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 64, 128, 0.5);
        }

        @media (max-width: 768px) {
            .container {
                width: 90%;
                padding: 20px;
                margin: 30px auto;
            }
            button, .cancel-button {
                width: 100%;
            }
        }
    </style>

    <div class="container">
        <h1 style="color: #004080; margin-bottom: 20px; font-size: 24px; font-weight: bold;">📝 Add a New Blog</h1>

        <form method="post">
            {% csrf_token %}

            <div>
                <label for="title">Blog Title:</label>
                <input type="text" name="title" id="title" required>

                <label for="author">Author:</label>
                <input type="text" name="author" id="author" required>

                <label for="content">Content:</label>
                <textarea name="content" id="content" rows="6" required></textarea>
            </div>

            <button type="submit">🚀 Submit</button>
        </form>

        <a href="{% url 'blog_list' %}" class="cancel-button">❌ Cancel</a>
    </div>
{% endblock %}
