{% extends 'base.html' %}
{% block title %}Edit {{ model_name }}{% endblock %}
{% block content %}
<div class="form-container">
    <h2>Edit {{ model_name }}</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Update</button>
        <a href="{% url 'manage_model' model_name %}">Cancel</a>
    </form>
</div>
{% endblock %}
