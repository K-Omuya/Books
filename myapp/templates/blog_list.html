{% extends 'base.html' %}

{% block content %}
    <style>
    /* Mobile Responsiveness */
@media (max-width: 768px) {
    .bookclub-form {
        width: 95%;
        padding: 15px;
    }
    .navbar .container {
            flex-direction: column;
            align-items: flex-start;
        }

}
    </style>

<div style="max-width: 1400px; margin: 50px auto; padding: 10px; background-color: #F5F5F5;
            border-radius: 10px; text-align: center;">

    <h1 style="color: #004080; font-size: 28px; font-weight: bold; margin-bottom: 20px;">
        📚 Educational Blogs & Impact Stories
    </h1>



    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px; margin-top: 20px;">

        {% for blog in blogs %}
        <div style="background-color: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
                    text-align: left; transition: 0.3s;">

            <h2 style="color: #004080; font-size: 20px; margin-bottom: 10px;">
{#                <a href="{% url 'blog_detail' blog.pk %}" style="color: inherit; text-decoration: none;">#}
                    {{ blog.title }}
                </a>
            </h2>

            <p style="color: #333333; font-size: 14px; margin-bottom: 10px;">
                ✍️ <b>{{ blog.author }}</b> | 📅 {{ blog.date_posted|date:"M d, Y" }}
            </p>

            <p style="color: #333333; font-size: 14px; line-height: 1.6;">
                {{ blog.content|truncatewords:30 }}
            </p>
        </div>
        {% empty %}
        <p style="color: #333333; font-size: 16px;">No blogs available.</p>
        {% endfor %}

    </div>
</div>

<!-- Hover Effects -->
<style>
    a:hover { background-color: #e67300; }
    div:hover { transform: scale(1.02); box-shadow: 0px 6px 15px rgba(0, 0, 0, 0.3); }
</style>

{% endblock %}
