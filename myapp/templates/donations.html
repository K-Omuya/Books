{% extends 'base.html' %}
{% block title %}Donations{% endblock %}

{% block content %}
<style>
/* Background */
body {
    background: url('/static/images/books_bg.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* Main Container */
.container {
    width: 80%;
    margin: auto;
    padding: 20px;
}

/* Forms */
.form-container {
    background-color: rgba(255, 255, 255, 0.9);
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* Buttons */
.btn-submit {
    background-color: #FF8200;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.btn-submit:hover {
    background-color: #e67300;
}
</style>

<div class="container">
    <h2>Make a Donation</h2>

    <!-- Book Pledge Form -->
    <div class="form-container">
        <h3>Pledge Books</h3>
        <form method="post">
            {% csrf_token %}
            {{ pledge_form.as_p }}
            <button type="submit" name="pledge_submit" class="btn-submit">Pledge Now</button>
        </form>
    </div>

    <!-- Book Donation Form -->
    <div class="form-container">
        <h3>Donate Books</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ book_form.as_p }}
            <button type="submit" name="book_submit" class="btn-submit">Donate Book</button>
        </form>
    </div>

    <!-- Monetary Donation Form -->
    <div class="form-container">
        <h3>Make a Monetary Donation</h3>
        <form method="post">
            {% csrf_token %}
            {{ money_form.as_p }}
            <button type="submit" name="money_submit" class="btn-submit">Donate Money</button>
        </form>
    </div>
</div>
{% endblock %}
