<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .navbar {
            background-color: #004080;
            color: white;
            padding: 1rem;
        }
        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo img {
            padding: 10px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .navbar .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            align-items: center;
        }
        .navbar .nav-links li {
            margin: 0 1rem;
            position: relative;
        }
        .navbar .nav-links li a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            display: inline-block;
        }
        .dropdown {
            position: relative;
        }
        .dropdown .dropbtn {
            background-color: transparent;
            color: white;
            border: none;
            cursor: pointer;
            padding: 0.5rem 1rem;
            text-decoration: none;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #4f63b1;
            min-width: 180px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            z-index: 1;
            top: 100%;
            left: 0;
            border-radius: 5px;
        }
        .dropdown-content a {
            color: white;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #004080;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
        }
        .footer {
            background-color: #004080;
            color: white;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            bottom: 0;
        }
        .footer div {
            text-align: center;
        }
        .footer a {
            color: #FF8200;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="{% static 'logo.jpg' %}" alt="Books for All">
            </div>
            <h1>Books for All</h1>
            <ul class="nav-links">
                <li><a href="{% url 'index' %}">Home</a></li>
                <li><a href="{% url 'about_contact' %}">About Us</a></li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Club</a>
                    <div class="dropdown-content">
                        <a href="{% url 'add_book_club' %}">Create Book Club</a>
                        <a href="{% url 'book_clubs_list' %}">View Book Clubs</a>
                    </div>
                </li>
                <li class="dropdown">
                    <a href="#" class="dropbtn">Books</a>
                    <div class="dropdown-content">
                        <a href="{% url 'view_donated_books' %}">Donated Books</a>
                        <a href="{% url 'book_exchange_list' %}">Book Catalogue</a>
                        <a href="{% url 'view_pledged_books' %}">Pledged Books</a>
                    </div>

                <li><a href="{% url 'blog_list' %}">Blogs</a></li>
            </ul>
        </div>
    </nav>
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
    <footer class="footer">
        <div>
            <h3>📞 Contact Us</h3>
            <p>Email: <a href="mailto:Bookforall@prc.cx">Bookforall@prc.cx</a></p>
            <p>Phone: <a href="tel:+254703128764">+254 703 128764</a></p>
        </div>
        <div>
            <a href="{% url 'admin:index' %}" class="btn btn-primary">Go to Admin</a>
        </div>
        <div>
            <h3>📲 Follow Us</h3>
            <a href="https://x.com/Bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670151.png" alt="Twitter (X)" width="25"></a>
            <a href="https://instagram.com/bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram" width="25"></a>
            <a href="https://facebook.com/bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook" width="25"></a>
            <a href="https://linkedin.com/bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" alt="LinkedIn" width="25"></a>
            <a href="https://wa.me/254743688354?text=I%20saw%20your%20work%20amazing%20and%20am%20interested" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" alt="WhatsApp" width="25"></a>
        </div>
    </footer>
</body>
</html>
