<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">

    <style>
        :root {
            --deep-blue: #004080;
            --bright-orange: #a59d95;
            --soft-green: #3CB371;
            --dark-gray: #333333;
            --light-gray: #F5F5F5;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--light-gray);
        }

        /* Navbar */
        .navbar {
            background-color: var(--deep-blue);
            color: white;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo-text {
            font-size: 39px;
            font-weight: bold;
            color: white;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 15px;
        }

        .nav-links li {
            position: relative;
        }

        .nav-links a, .dropbtn {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            font-size: 16px;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background: var(--deep-blue);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            min-width: 180px;
            border-radius: 5px;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        /* Mobile Menu */
        .menu-toggle {
            display: none;
            font-size: 24px;
            background: none;
            border: none;
            color: white;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
                flex-direction: column;
                background: var(--deep-blue);
                width: 100%;
                position: absolute;
                top: 60px;
                left: 0;
                text-align: center;
                padding: 10px 0;
            }

            .nav-links.show {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }

        /* Content */
        .content {
            padding: 20px;
        }
/* Footer */
.footer {
    background-color: var(--deep-blue);
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px; /* Adds spacing between divs */
    text-align: center;
}

.footer div {
    flex: 1;
    margin: 10px 0;
}

.footer a {
    color: var(--bright-orange);
    text-decoration: none;
    font-size: 16px;
}

.social-icons {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px; /* More spacing for tapability */
}

.social-icons img {
    width: 30px;
    height: 30px;
    margin: 5px;
}

/* Admin Button */
.admin-button {
    padding: 12px 20px;
    background: var(--bright-orange);
    color: white;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
    transition: 0.3s;
    display: inline-block;
    margin: 10px auto;
}

.admin-button:hover {
    background: #e67300;
}

/* Mobile Adjustments */
@media (max-width: 768px) {
    .footer {
        flex-direction: column;
        gap: 25px; /* Increased spacing for better touch experience */
        padding: 25px;
    }

    .social-icons img {
        width: 35px; /* Larger icons for easier clicking */
        height: 35px;
    }

    .admin-button {
        width: 80%; /* Makes it easier to tap */
        text-align: center;
        font-size: 18px;
    }
}

/* Mobile View */
@media (max-width: 768px) {
    .nav-links {
        display: none;
    }

    .menu-toggle {
        display: block;
    }

    .navbar .sidebar {
        left: -260px;
    }

    .navbar .sidebar.open {
        left: 0;
    }

    .dropdown-content {
        position: relative;
        left: 20px;
        top: 5px;
    }
}
/* Mobile View */
@media (max-width: 768px) {
    .nav-links {
        display: none;
    }

    .menu-toggle {
        display: block;
    }

    .navbar .sidebar {
        left: -260px;
    }

    .navbar .sidebar.open {
        left: 0;
    }

    .dropdown-content {
        position: relative;
        left: 20px;
        top: 5px;
    }
}

    </style>
</head>
<body>

    <nav class="navbar">
        <button class="menu-toggle">☰</button>
        <div class="logo-container">
            <div class="logo">
                <img src="{% static 'logo.jpg' %}" alt="Books for All">
            </div>
            <div class="logo-text">Books for All</div>
        </div>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'about_contact' %}">About Us</a></li>
            <li class="dropdown">
                <a href="#" class="dropbtn">Club</a>
                <div class="dropdown-content">
                    <a href="{% url 'add_book_club' %}">Create Book Club</a>
                    <a href="{% url 'book_clubs_list' %}">View Book Clubs</a>
                </div>
            </li>
            <li class="dropdown">
                <a href="#" class="dropbtn">Books</a>
                <div class="dropdown-content">
                    <a href="{% url 'view_donated_books' %}">Donated Books</a>
                    <a href="{% url 'book_exchange_list' %}">Book Catalogue</a>
                    <a href="{% url 'view_pledged_books' %}">Pledged Books</a>
                </div>
            </li>
            <li><a href="{% url 'blog_list' %}">Blogs</a></li>
        </ul>
    </nav>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="footer">
        <div>
            <h3>📞 Contact Us</h3>
            <p>Email: <a href="mailto:Bookforall@prc.cx">Bookforall@prc.cx</a></p>
            <p>Phone: <a href="tel:+254703128764">+254 703 128764</a></p>
        </div>
        <div class="social-icons">
            <h3>📲 Follow Us</h3>
            <a href="https://x.com/Bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670151.png" alt="Twitter (X)"></a>
            <a href="https://instagram.com/bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram"></a>
            <a href="https://facebook.com/bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook"></a>
            <a href="https://linkedin.com/bookforall20" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" alt="LinkedIn"></a>
            <a href="https://wa.me/254743688354?text=I%20saw%20your%20work%20amazing%20and%20am%20interested" target="_blank"><img src="https://cdn-icons-png.flaticon.com/512/3670/3670051.png" alt="WhatsApp"></a>
        </div>
        <a href="{% url 'admin:index' %}" class="admin-button">Go to Admin</a>
    </footer>

    <script>
        document.querySelector('.menu-toggle').addEventListener('click', function () {
            document.querySelector('.nav-links').classList.toggle('show');
        });

function toggleMenu() {
    var sidebar = document.getElementById("mobileSidebar");
    sidebar.classList.toggle("open");
    document.body.classList.toggle("menu-open");
}

function toggleSubmenu(submenuId) {
    var submenu = document.getElementById(submenuId);
    submenu.style.display = submenu.style.display === "block" ? "none" : "block";
}
</script>


</body>
</html>
