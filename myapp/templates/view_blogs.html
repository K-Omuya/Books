{% extends 'base.html' %}

{% block title %}View Blogs{% endblock %}

{% block content %}
    {% load static %}
  <!-- View Blogs Section -->
  <section class="view-blogs">
    <div class="container">
      <h2>View Blogs</h2>
      <div class="blog-list">
        {% for blog in blogs %}
        <div class="blog-item">
          <h3>{{ blog.title }}</h3>
          <p><em>Posted on {{ blog.created_at }}</em></p>
          {% if blog.image %}
          <img src="{{ blog.image.url }}" alt="{{ blog.title }}">
          {% endif %}
          <div class="blog-content">
            {{ blog.content|linebreaks }}
          </div>
        </div>
        {% endfor %}
      </div>
    </div>
  </section>
  <link rel="stylesheet" href="{% static 'css/view_blogs.css' %}">
{% endblock %}
