{% extends 'base.html' %}

{% block title %}Pledge a Book{% endblock %}

{% block content %}
    <style>
    .pledge-container {
    max-width: 500px;
    margin: 30px auto;
    padding: 20px;
    background: white;
    border-radius: 12px;
    box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    text-align: center;
    border-top: 5px solid #FF8200; /* Orange Accent */
}

h2 {
    color: #004080;
    font-size: 24px;
    margin-bottom: 10px;
}

.pledge-form {
    display: flex;
    flex-direction: column;
}

.pledge-form p {
    text-align: left;
    margin-bottom: 10px;
}

.pledge-form input,
.pledge-form select,
.pledge-form textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.btn.submit-btn {
    background: #FF8200; /* Orange */
    color: white;
    font-size: 16px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s ease-in-out;
}

.btn.submit-btn:hover {
    background: #004080; /* Deep Blue on hover */
}

    </style>
<div class="pledge-container">
    <h2>Pledge a Book</h2>

    <form method="POST" class="pledge-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn submit-btn">Submit Pledge</button>
    </form>
</div>
{% endblock %}
