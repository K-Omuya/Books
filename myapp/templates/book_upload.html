<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload a Book</title>
    <style>
        body {
            background: url('/static/images/books_quill.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            margin: auto;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        .btn {
            background-color: orange;
            padding: 10px;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            display: block;
            margin: auto;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload a Book</h2>
        {% if messages %}
        <ul>
            {% for message in messages %}
            <li style="color: yellow;">{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn">Submit & Pay 20 Shillings</button>
        </form>
    </div>
</body>
</html>
