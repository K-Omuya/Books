{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>{{ blog.title }}</h1>
    <p class="blog-meta">By {{ blog.author }} | {{ blog.date_posted|date:"M d, Y" }}</p>
    <p>{{ blog.content }}</p>
    <a href="{% url 'blog_list' %}" class="btn">Back to Blogs</a>
</div>
{% endblock %}
